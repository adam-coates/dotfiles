# Use Vi mode
setw -g mode-keys vi

set -g prefix C-b
bind-key C-b send-prefix

unbind %
bind | split-window -h

unbind '"'
bind - split-window -v

unbind r
bind r source-file ~/.config/tmux/tmux.conf

bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5
bind -r h resize-pane -L 5

bind -r m resize-pane -Z

set -g mouse on

set-window-option -g mode-keys vi

bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection

# remove delay for exiting insert mode with ESC in Neovim
set -sg escape-time 10

# Increase scrollback buffer size
set -g history-limit 10000

# Start window and pane numbering from 1 for easier switching
set -g base-index 1
setw -g pane-base-index 1

# Allow automatic renaming of windows
set -g allow-rename on

# Renumber windows when one is removed.
set -g renumber-windows on

# Improve colors
set -g default-terminal "${TERM}"

# Enable undercurl
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'

# Enable undercurl colors
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

# Allow tmux to set the terminal title
set -g set-titles on

# Monitor window activity to display in the status bar
setw -g monitor-activity off

# A bell in another window should cause a bell in the current window
set -g bell-action any

# Don't show distracting notifications
set -g visual-bell off
set -g visual-activity off

# Focus events enabled for terminals that support them
set -g focus-events on

# Useful when using sharing a session with different size terminals
setw -g aggressive-resize on

# don't detach tmux when killing a session
set -g detach-on-destroy off

# address vim mode switching delay
set -s escape-time 0

set -as terminal-features ",*:RGB"
set -ag terminal-overrides ",xterm-256color:RGB"

#--------------------------------------------------------------------------
# Plugins
#--------------------------------------------------------------------------

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'olimorris/tmux-pomodoro-plus'

set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'

set -gq allow-passthrough on

set -g @pomodoro_granularity 'on'
set -g status-interval 1

#--------------------------------------------------------------------------
# Status line
#--------------------------------------------------------------------------

set-option -g status "on"

# Nerdfont characters
HALF_ROUND_OPEN=""
HALF_ROUND_CLOSE=""
TRIANGLE_OPEN=""
TRIANGLE_CLOSE=""

# Basic colors of the Statusbar
set-option -g status-style "fg=default,bg=default"

# Show the window list centered between the left and the right section
set-option -g status-justify centre

# Style and set contents on the left section
set-option -g status-left "\
#[fg=grey,bg=default,bold]${HALF_ROUND_OPEN}\
#[fg=black,bg=grey,bold]#S \
#[fg=grey,bg=default]${TRIANGLE_CLOSE}\
"

# Define script paths
SCRIPTS_PATH="$HOME/.tmux/scripts"

# Git status widgets
git_status="#($SCRIPTS_PATH/git-status.sh #{pane_current_path})"
wb_git_status="#($SCRIPTS_PATH/wb-git-status.sh #{pane_current_path} &)"

# Pomodoro styling
set -g @pomodoro_on "#[fg=magenta]  "
set -g @pomodoro_complete "#[fg=green] "
set -g @pomodoro_pause "#[fg=yellow] ⏸︎ "
set -g @pomodoro_prompt_break "#[fg=cyan]🕤 ? "
set -g @pomodoro_prompt_pomodoro "#[fg=brightblack]🕤 ? "

# Style and set contents on the right section
set-option -g status-right "#{pomodoro_status}$git_status$wb_git_status"

# Set max length of left and right section
set-option -g status-left-length 100
set-option -g status-right-length 150

# Style and set content for the inactive windows
set-option -g window-status-format "\
#[bg=default] \
#[fg=brightblack,bg=default]#I\
#[fg=magenta,bg=default]:\
#[fg=brightblack,bg=default]#W\
 \
"

# Style and set content for the active windows
set-option -g window-status-current-format "\
#[fg=grey,bg=default]${HALF_ROUND_OPEN}\
#[fg=black,bg=grey]#I\
#[fg=magenta]:\
#[fg=black]#W\
#[fg=grey,bg=default]${HALF_ROUND_CLOSE}\
"

# Remove the separator between window list items
set-option -g window-status-separator ""

set-option -g allow-passthrough on

# Pane borders
set -g pane-border-style "fg=brightblack"
set -g pane-active-border-style "fg=blue"
set -g message-style "bg=default,fg=blue"
set -g message-command-style "bg=default,fg=blue"
set -g mode-style "bg=blue,fg=black"
setw -g clock-mode-colour blue

run '~/.tmux/plugins/tpm/tpm'
